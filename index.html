<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architect Portfolio | OOO</title>
    <style>
        /* 기본 디자인: 미니멀 & 건축적 여백 */
        body { font-family: 'Pretendard', sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 40px; background: #fff; }
        header { max-width: 1000px; margin: 0 auto 80px; }
        h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; border-bottom: 2px solid #000; display: inline-block; padding-bottom: 5px; }
        p.intro { font-size: 15px; color: #666; max-width: 600px; margin-top: 20px; }

        /* 프로젝트 그리드 */
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .project-card { position: relative; overflow: hidden; cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
        .project-card:hover { border-color: #000; }
        .project-img { width: 100%; height: 250px; background: #f4f4f4; object-fit: cover; }
        .project-info { padding: 15px; }
        .project-title { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
        .project-meta { font-size: 13px; color: #888; }

        /* 보안 모달 (비밀번호) */
        #password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .pw-box { text-align: center; }
        input[type="password"] { padding: 10px; border: 1px solid #ccc; width: 200px; outline: none; }
        button { padding: 10px 20px; background: #000; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 비밀번호 보안 레이어 (재직자 필수) -->
    <div id="password-overlay">
        <div class="pw-box">
            <h3>Confidential Archive</h3>
            <p>프로젝트 보호를 위해 비밀번호를 입력해주세요.</p>
            <input type="password" id="pw-input" placeholder="Password">
            <button onclick="checkPassword()">ENTER</button>
        </div>
    </div>

    <!-- 메인 컨텐츠 -->
    <header>
        <h1>OOO | ARCHITECTURAL ARCHIVE</h1>
        <p class="intro">
            다양한 실무 환경에서 프로젝트의 전 과정을 경험하며 쌓아온 기록입니다.<br>
            기획 설계부터 실시설계, 인허가 대응까지의 실질적인 기여도를 중심으로 구성하였습니다.
        </p>
    </header>

    <div class="container">
        <!-- 프로젝트 1 -->
        <div class="project-card">
            <div class="project-img"> <!-- 이미지 태그로 교체 가능 --> </div>
            <div class="project-info">
                <div class="project-title">AA 문화복합센터 신축공사</div>
                <div class="project-meta">2022-2023 | 실시설계 총괄 & 인허가</div>
            </div>
        </div>

        <!-- 프로젝트 2 -->
        <div class="project-card">
            <div class="project-img"></div>
            <div class="project-info">
                <div class="project-title">BB 근린생활시설 현상설계</div>
                <div class="project-meta">2021 | 기획 및 계획설계 (당선작)</div>
            </div>
        </div>
    </div>

    <script>
        function checkPassword() {
            const pw = document.getElementById('pw-input').value;
            if(pw === "arch1234") { // 설정할 비밀번호
                document.getElementById('password-overlay').style.display = 'none';
            } else {
                alert("비밀번호가 일치하지 않습니다.");
            }
        }
    </script>
</body>
</html>
